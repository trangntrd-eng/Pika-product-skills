# ============================================================================
# PM ORCHESTRATOR — SKILL DEPENDENCY GRAPH
# ============================================================================
#
# This file defines the lifecycle phases, skill nodes, and dependency edges
# that the master orchestrator uses to determine what to do next.
#
# Each skill node declares:
#   - phase: which lifecycle phase it belongs to
#   - plugin: which plugin contains it
#   - produces: artifact types this skill generates
#   - requires: artifact types needed (soft dependencies — warn, don't block)
#   - enhancedBy: artifacts that improve output quality if available
#   - effort: relative effort (quick / moderate / deep)
#   - description: one-line summary for the orchestrator to present
#
# The orchestrator reads this graph + project-state.md to determine:
#   1. What phase the project is in
#   2. Which skills are unblocked (dependencies satisfied)
#   3. What the highest-leverage next action is
#   4. Which prior artifacts to inject as context
# ============================================================================

# ----------------------------------------------------------------------------
# LIFECYCLE PHASES (ordered)
# ----------------------------------------------------------------------------
phases:
  - id: discover
    name: "Discovery"
    description: "Understand users, market, and problem space"
    goal: "Validated understanding of who you're building for and what problems matter"
    exit_criteria:
      - personas or user-segments defined
      - key assumptions identified and prioritized
      - at least one validation experiment designed

  - id: strategy
    name: "Strategy"
    description: "Define vision, positioning, and business model"
    goal: "Clear strategic direction with defensible choices and trade-offs"
    exit_criteria:
      - product strategy or vision documented
      - business model defined
      - competitive positioning articulated

  - id: design-learning
    name: "Learning Design"
    description: "Design pedagogically sound learning experiences before building features"
    goal: "Learning objectives, pedagogy model, curriculum structure, and assessment design ready to inform the PRD"
    exit_criteria:
      - learning objectives defined with Bloom's levels
      - pedagogy model selected
      - curriculum structure documented
      - assessment and feedback systems designed

  - id: plan
    name: "Planning"
    description: "Translate strategy into executable plans"
    goal: "Actionable PRD, OKRs, and roadmap ready for engineering"
    exit_criteria:
      - PRD written and reviewed
      - OKRs defined
      - backlog prioritized with user stories

  - id: validate
    name: "Validation"
    description: "Test assumptions with experiments and data"
    goal: "Evidence-based confidence in key decisions"
    exit_criteria:
      - critical experiments run or designed
      - metrics dashboard in place
      - pre-mortem completed

  - id: launch
    name: "Go-to-Market"
    description: "Prepare positioning, channels, and launch plan"
    goal: "Launch-ready GTM strategy with clear ICP and messaging"
    exit_criteria:
      - beachhead segment defined
      - ICP documented
      - GTM strategy with channel plan

  - id: grow
    name: "Growth"
    description: "Scale acquisition, retention, and revenue"
    goal: "Sustainable growth engine with measurable loops"
    exit_criteria:
      - North Star metric defined
      - growth loops identified
      - cohort analysis running

