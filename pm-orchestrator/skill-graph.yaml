# ============================================================================
# RECOMMENDED PATHS
# ============================================================================
# These are common sequences the orchestrator can suggest as accelerators.
# Users can follow them end-to-end or jump in at any point.
# ============================================================================

paths:
  new-product:
    name: "New Product (0 → 1)"
    description: "Full journey from idea to launch for a brand new product"
    steps:
      - brainstorm-ideas-new
      - user-personas
      - competitor-analysis
      - market-sizing
      - identify-assumptions-new
      - prioritize-assumptions
      - brainstorm-experiments-new
      - product-vision
      - startup-canvas        # strategy + business model in one
      - value-proposition
      - pricing-strategy
      - create-prd
      - user-stories
      - brainstorm-okrs
      - pre-mortem
      - beachhead-segment
      - ideal-customer-profile
      - gtm-strategy
      - north-star-metric
      - growth-loops

  existing-product-feature:
    name: "New Feature (existing product)"
    description: "Discovery through delivery for a feature on a live product"
    steps:
      - analyze-feature-requests
      - brainstorm-ideas-existing
      - identify-assumptions-existing
      - prioritize-assumptions
      - brainstorm-experiments-existing
      - opportunity-solution-tree
      - create-prd
      - user-stories
      - test-scenarios
      - sprint-plan
      - metrics-dashboard
      - release-notes

  strategic-pivot:
    name: "Strategic Pivot"
    description: "Re-evaluate strategy when market conditions change"
    steps:
      - competitor-analysis
      - sentiment-analysis
      - swot-analysis
      - pestle-analysis
      - porters-five-forces
      - product-strategy
      - ansoff-matrix
      - value-proposition
      - monetization-strategy
      - outcome-roadmap

  launch-prep:
    name: "Launch Preparation"
    description: "Get launch-ready when you have a product but no GTM plan"
    steps:
      - user-personas
      - competitor-analysis
      - beachhead-segment
      - ideal-customer-profile
      - value-proposition
      - competitive-battlecard
      - gtm-strategy
      - gtm-motions
      - north-star-metric
      - marketing-ideas
      - growth-loops
      - pre-mortem

  discovery-sprint:
    name: "Discovery Sprint"
    description: "Rapid 1-week discovery cycle"
    steps:
      - user-personas
      - brainstorm-ideas-existing
      - identify-assumptions-existing
      - prioritize-assumptions
      - interview-script
      - brainstorm-experiments-existing
      - metrics-dashboard

